name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore from base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, relying on local debug.keystore if present."
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Build Release Bundle (AAB)
      run: ./gradlew bundleRelease --stacktrace

    - name: Organize Outputs
      run: |
        mkdir -p build-artifacts
        find app/build/outputs/ -name "*.apk" -exec cp {} build-artifacts/ \;
        find app/build/outputs/ -name "*.aab" -exec cp {} build-artifacts/ \;
        echo "Build artifacts organized:"
        ls -la build-artifacts/

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build-outputs
        path: build-artifacts/
